window.loadTargetImage = e => { if (e.target.files[0]) loadTargetImageFile(e.target.files[0]); };
window.loadTargetImageFile = file => {
  const reader = new FileReader();
  reader.onload = ev => {
    _tgt.imageData = ev.target.result;
    _tgt.image = null;
    _tgt.scale = null;
    _tgt.poa = null;
    _tgt.impacts = [];
    _tgt.mode = 'scale1';
    navigate('target');
  };
  reader.readAsDataURL(file);
};

function initTargetCanvas() {
  const canvas = document.getElementById('target-canvas');
  const wrap   = document.getElementById('target-canvas-wrap');
  if (!canvas || !wrap) return;

  const img = new Image();
  img.onload = () => {
    _tgt.image = img;
    const maxW = wrap.clientWidth || 360;
    const ratio = img.height / img.width;
    canvas.width  = maxW;
    canvas.height = Math.round(maxW * ratio);
    drawTargetCanvas();
    renderTargetStats();
    updateScaleIndicator();
  };
  img.src = _tgt.imageData;

  // ── Pointer events for canvas ──
  canvas.addEventListener('pointerdown', onTgtPointerDown);
  canvas.addEventListener('pointermove', onTgtPointerMove);
  canvas.addEventListener('pointerup',   onTgtPointerUp);
  canvas.addEventListener('pointercancel', () => { _tgt.dragging = false; });
}

function canvasToImage(cx, cy) {
  const canvas = document.getElementById('target-canvas');
  if (!canvas || !_tgt.image) return {x:cx, y:cy};
  const scaleX = _tgt.image.width  / canvas.width;
  const scaleY = _tgt.image.height / canvas.height;
  return { x: cx * scaleX, y: cy * scaleY };
}
function imageToCanvas(ix, iy) {
  const canvas = document.getElementById('target-canvas');
  if (!canvas || !_tgt.image) return {x:ix, y:iy};
  const scaleX = canvas.width  / _tgt.image.width;
  const scaleY = canvas.height / _tgt.image.height;
  return { x: ix * scaleX, y: iy * scaleY };
}
function getCanvasPos(e) {
  const canvas = document.getElementById('target-canvas');
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top)  * scaleY,
  };
}

// Hit test: checks circle AND diamond handle. Returns impact index or -1.
function hitTestImpact(cx, cy) {
  const BASE_R     = _tgt.impactSize === 'sm' ? 10 : _tgt.impactSize === 'lg' ? 26 : 18;
  const CIRCLE_HIT = Math.max(BASE_R + 8, 22);
  const HANDLE_HIT = 18;
  const HANDLE_OFF = BASE_R + 30;
  for (let i = _tgt.impacts.length - 1; i >= 0; i--) {
    const c  = imageToCanvas(_tgt.impacts[i].x, _tgt.impacts[i].y);
    const dx = cx - c.x, dy = cy - c.y;
    if (Math.sqrt(dx*dx + dy*dy) < CIRCLE_HIT) return i;
    const hdx = cx - c.x, hdy = cy - (c.y + HANDLE_OFF);
    if (Math.sqrt(hdx*hdx + hdy*hdy) < HANDLE_HIT) return i;
  }
  return -1;
}

function onTgtPointerDown(e) {
  e.preventDefault();
  const {x, y} = getCanvasPos(e);
  const imgPos  = canvasToImage(x, y);

  if (_tgt.mode === 'select') {
    const HIT_POA   = 22;  // tap radius for POA crosshair
    const HIT_SCALE = 18;  // tap radius for scale reference dots

    // Priority: POA → scale2 → scale1 → impacts
    if (_tgt.poa) {
      const c = imageToCanvas(_tgt.poa.x, _tgt.poa.y);
      const dx = x - c.x, dy = y - c.y;
      if (Math.sqrt(dx*dx + dy*dy) < HIT_POA) {
        _tgt.dragging = true; _tgt.dragType = 'poa';
        _tgt.dragOffsetX = dx; _tgt.dragOffsetY = dy;
        _tgt.selectedIdx = -1;
        document.getElementById('tgt-delete-wrap').style.display = 'none';
        drawTargetCanvas(); return;
      }
    }
    if (_tgt.scaleP2) {
      const c = imageToCanvas(_tgt.scaleP2.x, _tgt.scaleP2.y);
      const dx = x - c.x, dy = y - c.y;
      if (Math.sqrt(dx*dx + dy*dy) < HIT_SCALE) {
        _tgt.dragging = true; _tgt.dragType = 'scale2';
        _tgt.dragOffsetX = dx; _tgt.dragOffsetY = dy;
        _tgt.selectedIdx = -1;
        document.getElementById('tgt-delete-wrap').style.display = 'none';
        drawTargetCanvas(); return;
      }
    }
    if (_tgt.scaleP1) {
      const c = imageToCanvas(_tgt.scaleP1.x, _tgt.scaleP1.y);
      const dx = x - c.x, dy = y - c.y;
      if (Math.sqrt(dx*dx + dy*dy) < HIT_SCALE) {
        _tgt.dragging = true; _tgt.dragType = 'scale1';
        _tgt.dragOffsetX = dx; _tgt.dragOffsetY = dy;
        _tgt.selectedIdx = -1;
        document.getElementById('tgt-delete-wrap').style.display = 'none';
        drawTargetCanvas(); return;
      }
    }
    // Impact markers
    const idx = hitTestImpact(x, y);
    if (idx >= 0) {
      _tgt.selectedIdx = idx; _tgt.dragging = true; _tgt.dragType = 'impact';
      const c = imageToCanvas(_tgt.impacts[idx].x, _tgt.impacts[idx].y);
      _tgt.dragOffsetX = x - c.x; _tgt.dragOffsetY = y - c.y;
      document.getElementById('tgt-delete-wrap').style.display = '';
    } else {
      _tgt.selectedIdx = -1; _tgt.dragging = false; _tgt.dragType = null;
      document.getElementById('tgt-delete-wrap').style.display = 'none';
    }
    drawTargetCanvas();
    return;
  }

  if (_tgt.mode === 'poa') {
    _tgt.poa = imgPos;
    drawTargetCanvas();
    renderTargetStats();
    setTgtMode('impact');
    toast('POA SET — TAP IMPACTS','success');
    return;
  }

  if (_tgt.mode === 'scale1') {
    _tgt.scaleP1 = imgPos;
    _tgt.scaleP2 = null;
    _tgt.mode = 'scale2';
    updateTgtHint();
    drawTargetCanvas();
    return;
  }

  if (_tgt.mode === 'scale2') {
    _tgt.scaleP2 = imgPos;
    computeScale();
    drawTargetCanvas();
    return;
  }

  if (_tgt.mode === 'impact') {
    _tgt.impacts.push({ x: imgPos.x, y: imgPos.y, num: _tgt.impacts.length + 1 });
    drawTargetCanvas();
    renderTargetStats();
    return;
  }
}

function onTgtPointerMove(e) {
  if (!_tgt.dragging) return;
  e.preventDefault();
  const {x, y} = getCanvasPos(e);
  const newCx = x - _tgt.dragOffsetX;
  const newCy = y - _tgt.dragOffsetY;
  const imgPos = canvasToImage(newCx, newCy);

  if (_tgt.dragType === 'poa') {
    _tgt.poa = imgPos; drawTargetCanvas(); renderTargetStats(); return;
  }
  if (_tgt.dragType === 'scale1') {
    _tgt.scaleP1 = imgPos; if (_tgt.scaleP2) computeScale(true); drawTargetCanvas(); return;
  }
  if (_tgt.dragType === 'scale2') {
    _tgt.scaleP2 = imgPos; if (_tgt.scaleP1) computeScale(true); drawTargetCanvas(); return;
  }
  // Impact drag
  if (_tgt.selectedIdx < 0) return;
  _tgt.impacts[_tgt.selectedIdx].x = imgPos.x;
  _tgt.impacts[_tgt.selectedIdx].y = imgPos.y;
  drawTargetCanvas(); renderTargetStats();
}

function onTgtPointerUp(e) {
  _tgt.dragging = false;
}

function computeScale(silent = false) {
  const p1 = _tgt.scaleP1, p2 = _tgt.scaleP2;
  if (!p1 || !p2) return;
  const px = Math.sqrt((p2.x-p1.x)**2 + (p2.y-p1.y)**2);
  const distEl   = document.getElementById('tgt-scale-dist');
  const unitEl   = document.getElementById('tgt-scale-unit');
  const knownDist = parseFloat(distEl?.value)||1;
  const unit      = unitEl?.value||'in';
  const inchConv  = unit==='in' ? 1 : unit==='cm' ? 1/2.54 : 1/25.4;
  const knownIn   = knownDist * inchConv;
  _tgt.scale = px / knownIn;  // pixels per inch
  const statusEl = document.getElementById('tgt-scale-status');
  if (statusEl) statusEl.textContent = `// SCALE SET: ${_tgt.scale.toFixed(1)} px/in · ${knownDist} ${unit} = ${px.toFixed(0)} px`;
  updateScaleIndicator();
  if (!silent) { toast(`SCALE SET: ${knownDist} ${unit}`,'success'); setTgtMode('poa'); }
}

function updateScaleIndicator() {
  const el = document.getElementById('tgt-scale-indicator');
  if (!el) return;
  el.textContent = _tgt.scale ? `// SCALE: ${_tgt.scale.toFixed(1)} px/in` : '// NO SCALE SET';
}

window.setTgtMode = mode => {
  _tgt.mode = mode;
  _tgt.dragging = false;
  _tgt.dragType = null;
  if (mode !== 'select') { _tgt.selectedIdx = -1; }
  ['scale','poa','impact','select'].forEach(m => {
    const b = document.getElementById(`tool-${m}`);
    if (b) b.className = `target-tool-btn${(mode===m||(mode==='scale2'&&m==='scale'))?'  active':''}`;
  });
  const scaleWrap = document.getElementById('tgt-scale-wrap');
  if (scaleWrap) scaleWrap.style.display = (mode==='scale1'||mode==='scale2') ? '' : 'none';
  const delWrap = document.getElementById('tgt-delete-wrap');
  if (delWrap) delWrap.style.display = (mode==='select' && _tgt.selectedIdx>=0) ? '' : 'none';
  updateTgtHint();
  drawTargetCanvas();
};

window.setImpactSize = size => {
  _tgt.impactSize = size;
  ['sm','md','lg'].forEach(s => {
    const b = document.getElementById(`tgt-sz-${s}`);
    if (b) b.className = `target-tool-btn${s === size ? ' active' : ''}`;
  });
  drawTargetCanvas();
};

function updateTgtHint() {
  const el = document.getElementById('tgt-hint'); if (!el) return;
  const hints = {
    scale1: '// SCALE TOOL: tap first reference point on image',
    scale2: '// SCALE TOOL: tap second reference point — then enter known distance',
    poa:    '// POA: tap the point of aim on the target',
    impact: '// IMPACT: tap each bullet hole in order',
    select: '// EDIT: drag any impact (circle or diamond handle), POA crosshair, or scale reference points',
  };
  el.textContent = hints[_tgt.mode] || '';
}

function drawTargetCanvas() {
  const canvas = document.getElementById('target-canvas');
  if (!canvas || !_tgt.image) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(_tgt.image, 0, 0, canvas.width, canvas.height);

  // ── Scale line ──
  if (_tgt.scaleP1) {
    const c1 = imageToCanvas(_tgt.scaleP1.x, _tgt.scaleP1.y);
    ctx.beginPath(); ctx.arc(c1.x, c1.y, 6, 0, Math.PI*2);
    ctx.fillStyle = '#FFD700'; ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.stroke();
  }
  if (_tgt.scaleP1 && _tgt.scaleP2) {
    const c1 = imageToCanvas(_tgt.scaleP1.x, _tgt.scaleP1.y);
    const c2 = imageToCanvas(_tgt.scaleP2.x, _tgt.scaleP2.y);
    ctx.beginPath(); ctx.moveTo(c1.x, c1.y); ctx.lineTo(c2.x, c2.y);
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2; ctx.setLineDash([5,3]); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(c2.x, c2.y, 6, 0, Math.PI*2);
    ctx.fillStyle = '#FFD700'; ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.stroke();
  }

  // ── POA crosshair ──
  if (_tgt.poa) {
    const c = imageToCanvas(_tgt.poa.x, _tgt.poa.y);
    const R = 12, ARM = 20;
    ctx.strokeStyle = '#00e676'; ctx.lineWidth = 2.5; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(c.x-ARM, c.y); ctx.lineTo(c.x-R, c.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(c.x+R, c.y);   ctx.lineTo(c.x+ARM, c.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(c.x, c.y-ARM); ctx.lineTo(c.x, c.y-R); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(c.x, c.y+R);   ctx.lineTo(c.x, c.y+ARM); ctx.stroke();
    ctx.beginPath(); ctx.arc(c.x, c.y, R, 0, Math.PI*2);
    ctx.strokeStyle = '#00e676'; ctx.lineWidth = 2; ctx.stroke();
  }

  // ── Impacts ──
  const IMPACT_R     = _tgt.impactSize === 'sm' ? 10 : _tgt.impactSize === 'lg' ? 26 : 18;
  const FONT_SZ      = _tgt.impactSize === 'sm' ?  8 : _tgt.impactSize === 'lg' ? 17 : 13;
  const CHX_GAP      = Math.max(IMPACT_R * 0.38, 4);
  const HANDLE_OFFSET = 30;

  _tgt.impacts.forEach((imp, i) => {
    const c     = imageToCanvas(imp.x, imp.y);
    const isSel = _tgt.selectedIdx === i;
    const ring  = isSel ? '#b24c3d' : '#2c5f88';
    const fill  = isSel ? 'rgba(178,76,61,0.22)' : 'rgba(44,95,136,0.18)';

    // Circle fill + stroke
    ctx.beginPath(); ctx.arc(c.x, c.y, IMPACT_R, 0, Math.PI*2);
    ctx.fillStyle = fill; ctx.fill();
    ctx.strokeStyle = ring; ctx.lineWidth = isSel ? 2.5 : 2; ctx.setLineDash([]); ctx.stroke();

    // Crosshair arms (edge → gap)
    ctx.strokeStyle = isSel ? 'rgba(178,76,61,0.9)' : 'rgba(44,95,136,0.85)';
    ctx.lineWidth = 1.5; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(c.x - IMPACT_R, c.y); ctx.lineTo(c.x - CHX_GAP, c.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(c.x + CHX_GAP, c.y); ctx.lineTo(c.x + IMPACT_R, c.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(c.x, c.y - IMPACT_R); ctx.lineTo(c.x, c.y - CHX_GAP); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(c.x, c.y + CHX_GAP); ctx.lineTo(c.x, c.y + IMPACT_R); ctx.stroke();

    // Number (outlined for legibility)
    ctx.font = `bold ${FONT_SZ}px 'Share Tech Mono', monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 2.5;
    ctx.strokeText(imp.num, c.x, c.y);
    ctx.fillStyle = isSel ? '#b24c3d' : '#fff';
    ctx.fillText(imp.num, c.x, c.y);

    // Drag handle (edit mode only)
    if (_tgt.mode === 'select') {
      const hx = c.x, hy = c.y + IMPACT_R + HANDLE_OFFSET;
      ctx.beginPath(); ctx.moveTo(c.x, c.y + IMPACT_R); ctx.lineTo(hx, hy);
      ctx.strokeStyle = isSel ? '#b24c3d' : 'rgba(44,95,136,0.6)';
      ctx.lineWidth = 1.5; ctx.setLineDash([3,2]); ctx.stroke(); ctx.setLineDash([]);
      // Diamond fill
      ctx.save(); ctx.translate(hx, hy); ctx.rotate(Math.PI/4);
      ctx.fillStyle = isSel ? '#b24c3d' : '#2c5f88';
      ctx.fillRect(-7, -7, 14, 14); ctx.restore();
      // Diamond white border
      ctx.save(); ctx.translate(hx, hy); ctx.rotate(Math.PI/4);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.setLineDash([]);
      ctx.strokeRect(-7, -7, 14, 14); ctx.restore();
    }
    // No canvas X button — use DELETE SELECTED button in UI instead
  });

  // ── Edit-mode drag handles for POA and scale reference points ──
  if (_tgt.mode === 'select') {
    // POA: pulsing ring to signal draggable
    if (_tgt.poa) {
      const c = imageToCanvas(_tgt.poa.x, _tgt.poa.y);
      const isDragging = _tgt.dragging && _tgt.dragType === 'poa';
      ctx.beginPath(); ctx.arc(c.x, c.y, 16, 0, Math.PI*2);
      ctx.strokeStyle = isDragging ? 'rgba(0,230,118,1)' : 'rgba(0,230,118,0.5)';
      ctx.lineWidth = isDragging ? 2.5 : 1.5; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
    }
    // Scale points: dashed ring
    [{pt: _tgt.scaleP1, type: 'scale1'}, {pt: _tgt.scaleP2, type: 'scale2'}].forEach(({pt, type}) => {
      if (!pt) return;
      const c = imageToCanvas(pt.x, pt.y);
      const isDragging = _tgt.dragging && _tgt.dragType === type;
      ctx.beginPath(); ctx.arc(c.x, c.y, 14, 0, Math.PI*2);
      ctx.strokeStyle = isDragging ? 'rgba(255,215,0,1)' : 'rgba(255,215,0,0.5)';
      ctx.lineWidth = isDragging ? 2.5 : 1.5; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
    });
  }

  // ── Group circle (smallest enclosing circle approx) ──
  if (_tgt.poa && _tgt.impacts.length >= 2 && _tgt.scale) {
    const stats = calcTargetStats();
    if (stats) {
      const cc = imageToCanvas(stats.centroid.x, stats.centroid.y);
      const groupRadiusPx = (stats.groupSize / 2) * _tgt.scale;
      ctx.beginPath(); ctx.arc(cc.x, cc.y, groupRadiusPx * (canvas.width/_tgt.image.width), 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1.5;
      ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);
      // Centroid dot
      ctx.beginPath(); ctx.arc(cc.x, cc.y, 4, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fill();
    }
  }
}

window.undoLastImpact = () => {
  if (_tgt.impacts.length === 0) return;
  _tgt.impacts.pop();
  // Renumber
  _tgt.impacts.forEach((imp,i) => imp.num = i+1);
  drawTargetCanvas();
  renderTargetStats();
};
window.deleteSelectedImpact = () => {
  if (_tgt.selectedIdx < 0) return;
  _tgt.impacts.splice(_tgt.selectedIdx, 1);
  _tgt.impacts.forEach((imp,i) => imp.num = i+1);
  _tgt.selectedIdx = -1;
  document.getElementById('tgt-delete-wrap').style.display = 'none';
  drawTargetCanvas();
  renderTargetStats();
};
window.clearTargetSession = () => {
  if (!confirm_('Clear all marks? Image will remain.')) return;
  _tgt.poa = null; _tgt.impacts = []; _tgt.scaleP1 = null; _tgt.scaleP2 = null;
  _tgt.scale = null; _tgt.selectedIdx = -1;
  drawTargetCanvas(); renderTargetStats();
};

// ── Stats engine ──
function calcTargetStats() {
  if (!_tgt.poa || _tgt.impacts.length < 1 || !_tgt.scale) return null;
  const pxPerIn = _tgt.scale;
  const distIn  = _tgt.distUnit==='m' ? _tgt.distYds * 39.3701 : _tgt.distYds * 36;
  const moaFactor = 1.047 / 36; // 1 MOA in inches per yard

  const shots = _tgt.impacts.map(imp => {
    const dx = (imp.x - _tgt.poa.x) / pxPerIn;  // inches, + = right
    const dy = (imp.y - _tgt.poa.y) / pxPerIn;  // inches, + = down (image coords)
    const windage   =  dx;                        // + = right
    const elevation = -dy;                        // + = up
    const dist      = Math.sqrt(dx*dx + dy*dy);
    return { num: imp.num, dist, windage, elevation };
  });

  const cx = shots.reduce((s,sh)=>s+sh.windage,  0) / shots.length;
  const cy = shots.reduce((s,sh)=>s+sh.elevation, 0) / shots.length;
  const centroid = {
    x: _tgt.poa.x + cx * pxPerIn,
    y: _tgt.poa.y - cy * pxPerIn,
    windage: cx, elevation: cy,
  };

  const meanRadius = shots.reduce((s,sh)=>{
    const d = Math.sqrt((sh.windage-cx)**2 + (sh.elevation-cy)**2);
    return s + d;
  }, 0) / shots.length;

  // Group size = max distance between any two impacts
  let groupSize = 0;
  for (let a=0; a<shots.length; a++) for (let b=a+1; b<shots.length; b++) {
    const d = Math.sqrt((_tgt.impacts[a].x-_tgt.impacts[b].x)**2+(_tgt.impacts[a].y-_tgt.impacts[b].y)**2)/pxPerIn;
    if (d > groupSize) groupSize = d;
  }

  // W/H spread
  const winds = shots.map(s=>s.windage), elevs = shots.map(s=>s.elevation);
  const wSpread = Math.max(...winds) - Math.min(...winds);
  const hSpread = Math.max(...elevs) - Math.min(...elevs);

  // MOA
  const yds = _tgt.distUnit==='m' ? _tgt.distYds*1.09361 : _tgt.distYds;
  const groupMOA     = yds > 0 ? groupSize     / (yds * moaFactor * 36) * 100 / 1.047 : 0;
  const meanRadMOA   = yds > 0 ? meanRadius    / (yds * moaFactor * 36) * 100 / 1.047 : 0;

  return { shots, centroid, meanRadius, groupSize, wSpread, hSpread, groupMOA, meanRadMOA };
}

function renderTargetStats() {
  const el = document.getElementById('tgt-stats-wrap'); if (!el) return;
  const stats = calcTargetStats();
  if (!stats) {
    el.innerHTML = !_tgt.scale ? `<p style="font-size:12px;font-family:'Share Tech Mono',monospace;color:var(--muted2)">// SET SCALE → POA → MARK IMPACTS TO SEE STATS</p>` :
      !_tgt.poa ? `<p style="font-size:12px;font-family:'Share Tech Mono',monospace;color:var(--muted2)">// SET POA THEN MARK IMPACTS</p>` :
      `<p style="font-size:12px;font-family:'Share Tech Mono',monospace;color:var(--muted2)">// MARK AT LEAST 1 IMPACT</p>`;
    return;
  }
  const {shots, centroid, meanRadius, groupSize, wSpread, hSpread, groupMOA, meanRadMOA} = stats;

  el.innerHTML = `
    <div class="section-title">Group Statistics</div>
    <div class="tgt-stat-grid">
      <div class="tgt-stat-box hi">
        <div class="tgt-stat-label">Group Size</div>
        <div class="tgt-stat-val">${groupSize.toFixed(3)}<span class="tgt-stat-unit">in</span></div>
        <div style="font-size:12px;color:var(--accent);font-family:'Share Tech Mono',monospace;margin-top:2px">${groupMOA.toFixed(2)} MOA</div>
      </div>
      <div class="tgt-stat-box hi">
        <div class="tgt-stat-label">Mean Radius</div>
        <div class="tgt-stat-val">${meanRadius.toFixed(3)}<span class="tgt-stat-unit">in</span></div>
        <div style="font-size:12px;color:var(--accent);font-family:'Share Tech Mono',monospace;margin-top:2px">${meanRadMOA.toFixed(2)} MOA</div>
      </div>
      <div class="tgt-stat-box">
        <div class="tgt-stat-label">POI-POA Windage</div>
        <div class="tgt-stat-val" style="color:${Math.abs(centroid.windage)<0.1?'var(--success)':centroid.windage>0?'var(--info)':'var(--info)'}">
          ${centroid.windage>=0?'+':''}${centroid.windage.toFixed(3)}<span class="tgt-stat-unit">in</span>
        </div>
        <div style="font-size:11px;color:var(--muted2);font-family:'Share Tech Mono',monospace;margin-top:2px">${centroid.windage>=0?'RIGHT':'LEFT'}</div>
      </div>
      <div class="tgt-stat-box">
        <div class="tgt-stat-label">POI-POA Elevation</div>
        <div class="tgt-stat-val" style="color:${Math.abs(centroid.elevation)<0.1?'var(--success)':centroid.elevation>0?'var(--success)':'var(--danger)'}">
          ${centroid.elevation>=0?'+':''}${centroid.elevation.toFixed(3)}<span class="tgt-stat-unit">in</span>
        </div>
        <div style="font-size:11px;color:var(--muted2);font-family:'Share Tech Mono',monospace;margin-top:2px">${centroid.elevation>=0?'HIGH':'LOW'}</div>
      </div>
      <div class="tgt-stat-box">
        <div class="tgt-stat-label">Width Spread</div>
        <div class="tgt-stat-val">${wSpread.toFixed(3)}<span class="tgt-stat-unit">in</span></div>
      </div>
      <div class="tgt-stat-box">
        <div class="tgt-stat-label">Height Spread</div>
        <div class="tgt-stat-val">${hSpread.toFixed(3)}<span class="tgt-stat-unit">in</span></div>
      </div>
    </div>

    <div class="section-title">Shot Data — ${shots.length} Impacts @ ${_tgt.distYds} ${_tgt.distUnit}</div>
    <div style="overflow-x:auto"><table class="tgt-shot-table">
      <thead><tr><th>#</th><th>Dist (in)</th><th>Wind (in)</th><th>Elev (in)</th></tr></thead>
      <tbody>${shots.map(s=>`<tr>
        <td>${s.num}</td>
        <td>${s.dist.toFixed(3)}</td>
        <td style="color:${s.windage>=0?'var(--info)':'var(--info)'}">${s.windage>=0?'+':''}${s.windage.toFixed(3)}</td>
        <td style="color:${s.elevation>=0?'var(--success)':'var(--danger)'}">${s.elevation>=0?'+':''}${s.elevation.toFixed(3)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
}

// ── Export ──
window.exportTargetSession = async () => {
  const stats = calcTargetStats();
  const payload = {
    app: 'ReloadingMaster',
    type: 'target_session',
    version: 1,
    exported_at: new Date().toISOString(),
    batch_id: _tgt.batchId || null,
    range_date: _tgt.rangeDate,
    distance: _tgt.distYds,
    distance_unit: _tgt.distUnit,
    scale_px_per_in: _tgt.scale,
    poa: _tgt.poa,
    impacts: _tgt.impacts,
    stats: stats ? {
      group_size_in:    stats.groupSize,
      group_size_moa:   stats.groupMOA,
      mean_radius_in:   stats.meanRadius,
      mean_radius_moa:  stats.meanRadMOA,
      poi_windage_in:   stats.centroid.windage,
      poi_elevation_in: stats.centroid.elevation,
      w_spread_in:      stats.wSpread,
      h_spread_in:      stats.hSpread,
      shots:            stats.shots,
    } : null,
    image: _tgt.imageData,
  };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const date = new Date().toISOString().slice(0,10);
  const filename = `target-${_tgt.batchId||'session'}-${date}.json`;
  if (navigator.share) {
    try {
      const file = new File([blob], filename, {type:'application/json'});
      await navigator.share({files:[file], title:'Target Session Export'});
      return;
    } catch(e) { if(e.name==='AbortError') return; }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('TARGET SESSION EXPORTED','success');
};

register('404',()=>{
  setTitle('404',true);
  render(`<div class="empty-state"><div class="empty-icon">${ICONS.erricon}</div><h3>Page Not Found</h3></div>`);
});
