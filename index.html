<style>

.btn svg{flex-shrink:0}

.lt-done{width:44px;padding-left:12px !important}.lt-num{width:36px;font-weight:700;color:var(--muted);font-family:'Share Tech Mono',monospace}

function drawNavRifle() {
  const canvas = document.getElementById('nav-rifle-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const navBtn = document.querySelector('[data-route="firearms"]');
  const active = navBtn && navBtn.classList.contains('active');
  const img = new Image();
  img.onload = function() {
    canvas.width = 68; canvas.height = 14;
    ctx.drawImage(img, 0, 0, 68, 14);
    // Tint to match other nav icons: --muted (#4a6a80) inactive, --accent (#4fc3f7) active
    ctx.globalCompositeOperation = 'source-in';
    ctx.fillStyle = active ? '#4fc3f7' : '#4a6a80';
    ctx.fillRect(0, 0, 68, 14);
    ctx.globalCompositeOperation = 'source-over';
  };

function drawRifleOnCanvas(canvas, w, h) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  const img = new Image();
  img.onload = function() {
    const scale = Math.min(w / 68, h / 14);
    const dw = Math.round(68 * scale);
    const dh = Math.round(14 * scale);
    const ox = Math.floor((w - dw) / 2);
    const oy = Math.floor((h - dh) / 2);
    ctx.drawImage(img, ox, oy, dw, dh);
    ctx.globalCompositeOperation = 'source-in';
    ctx.fillStyle = '#4fc3f7';
    ctx.fillRect(0, 0, w, h);
    ctx.globalCompositeOperation = 'source-over';
  };
  img.src = RIFLE_LARGE_B64;

<script>
// ════════════════════════════════════════════════════
//  DATABASE
// ════════════════════════════════════════════════════
const DB_NAME = 'ReloadingMasterV3', DB_VER = 1;
let db;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      ['firearms','components','batches'].forEach(s => {
        if (!d.objectStoreNames.contains(s))
          d.createObjectStore(s, s === 'batches' ? { keyPath: 'id' } : { keyPath: 'id', autoIncrement: true });
      });
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}
const dbGetAll = s => new Promise((r,j) => { const q=db.transaction(s).objectStore(s).getAll(); q.onsuccess=()=>r(q.result); q.onerror=()=>j(q.error); });
const dbGet   = (s,id) => new Promise((r,j) => { const q=db.transaction(s).objectStore(s).get(id); q.onsuccess=()=>r(q.result); q.onerror=()=>j(q.error); });
const dbPut   = (s,o) => new Promise((r,j) => { const q=db.transaction(s,'readwrite').objectStore(s).put(o); q.onsuccess=()=>r(q.result); q.onerror=()=>j(q.error); });
const dbDelete= (s,id) => new Promise((r,j) => { const q=db.transaction(s,'readwrite').objectStore(s).delete(id); q.onsuccess=()=>r(); q.onerror=()=>j(q.error); });

const routes = {};

function register(path, fn) { routes[path] = fn; }
function updateNav(path) {
  const base = path.split('/')[0];
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.route === base));
  setTimeout(drawNavRifle, 10);
}

  const btn = e.target.closest('.nav-item');
  if (btn) navigate(btn.dataset.route);
});
window.navigate = function(path) {
  currentRoute = path;
  const parts = path.split('/');
  let handler, handlerId;
  if (routes[path]) { handler = routes[path]; handlerId = ''; }
  else if (parts.length >= 2 && routes[parts[0]+'/'+parts[1]]) { handler = routes[parts[0]+'/'+parts[1]]; handlerId = parts.slice(2).join('/'); }
  else { handler = routes[parts[0]]; handlerId = parts.slice(1).join('/'); }
  if (handler) handler({ id: handlerId });
  else routes['404']({});
  updateNav(parts[0]);
};

function calcStats(velos) {
  const v = velos.filter(x => x>0 && !isNaN(x));
  if (!v.length) return { avg:0, sd:0, es:0, n:0 };
  const avg = v.reduce((a,b)=>a+b,0)/v.length;
  const sd  = Math.sqrt(v.reduce((s,x)=>s+(x-avg)**2,0)/v.length);
  return { avg, sd, es: Math.max(...v)-Math.min(...v), n: v.length };
}
function genBatchId(chambering, bullet, loadType, suffix) {
  const b = bullet.replace(/\s+/g,'').replace(/[^A-Z0-9]/gi,'').toUpperCase().slice(0,10);
  const ch = (chambering||'UNKN').replace(/\s+/g,'').replace(/[^A-Z0-9]/gi,'').toUpperCase().slice(0,8);
  const tc = loadType==='Charge Ladder'?'CHG':loadType==='Seating Ladder'?'SEAT':loadType==='Jump Ladder'?'JUMP':loadType==='Grouped'?'GRP':'VAL';
  return `${ch}-${b}-${tc}${suffix?'-'+suffix:''}`;
}

const G1_TABLE = [[0,.2629],[.05,.2558],[.1,.2487],[.15,.2413],[.2,.2336],[.25,.2254],[.3,.2167],[.35,.2076],[.4,.198],[.45,.1882],[.5,.1782],[.55,.168],[.6,.1579],[.65,.1477],[.7,.1373],[.75,.1267],[.8,.116],[.85,.1053],[.9,.1011],[.95,.0979],[1,.1162],[1.05,.1452],[1.1,.1481],[1.15,.1495],[1.2,.1504],[1.25,.1514],[1.3,.1522],[1.35,.153],[1.4,.1537],[1.45,.1545],[1.5,.1551],[1.6,.1565],[1.7,.1579],[1.8,.1594],[1.9,.1607],[2,.1621],[2.5,.1686],[3,.1752],[4,.19],[5,.2049]];
const G7_TABLE = [[0,.1198],[.05,.1197],[.1,.1196],[.15,.1194],[.2,.1193],[.25,.1194],[.3,.1194],[.35,.1194],[.4,.1193],[.45,.1193],[.5,.1194],[.55,.1193],[.6,.1194],[.65,.1197],[.7,.1202],[.725,.1207],[.75,.1215],[.775,.1226],[.8,.1242],[.825,.1266],[.85,.1306],[.875,.1368],[.9,.1464],[.925,.1660],[.95,.2054],[.975,.2993],[1.0,.3803],[1.025,.4015],[1.05,.4043],[1.075,.4034],[1.1,.4014],[1.125,.3987],[1.15,.3955],[1.2,.3884],[1.25,.3810],[1.3,.3732],[1.35,.3657],[1.4,.3580],[1.5,.3440],[1.55,.3376],[1.6,.3315],[1.65,.3260],[1.7,.3209],[1.75,.3160],[1.8,.3115],[1.85,.3072],[1.9,.3032],[1.95,.2995],[2.0,.2959],[2.05,.2927],[2.1,.2898],[2.15,.2871],[2.2,.2845],[2.25,.2822],[2.3,.2801],[2.35,.2781],[2.4,.2763],[2.45,.2745],[2.5,.2729],[2.6,.2699],[2.7,.2671],[2.8,.2644],[2.9,.2618],[3.0,.2595],[3.1,.2573],[3.2,.2553],[3.3,.2534],[3.4,.2515],[3.5,.2497],[3.6,.2480],[3.7,.2464],[3.8,.2449],[3.9,.2434],[4.0,.2420],[4.2,.2393],[4.4,.2368],[4.6,.2343],[4.8,.2320],[5.0,.2298]];

function interpDrag(table, m) {
  if (m <= table[0][0]) return table[0][1];
  if (m >= table[table.length-1][0]) return table[table.length-1][1];
  for (let i=1;i<table.length;i++) {
    if (m <= table[i][0]) {
      const t=(m-table[i-1][0])/(table[i][0]-table[i-1][0]);
      return table[i-1][1]+t*(table[i][1]-table[i-1][1]);
    }
  }
  return table[0][1];
}

// bcType: 'G1' or 'G7'
function computeDropTable(mv, bc, wt, tempF=59, altFt=0, hum=50, zero=100, maxYds=1000, intervalYds=100, bcType='G1') {
  if (!mv||!bc||!wt||mv<=0||bc<=0) return null;
  const table = bcType==='G7' ? G7_TABLE : G1_TABLE;
  // G7 uses a different form factor reference — scale factor differs
  const BC_s = bcType==='G7' ? bc*10.932 : bc*4.477;
  const Tr=tempF+459.67, Cs=49.0223*Math.sqrt(Tr);
  const P=29.921*Math.pow(1-6.87535e-6*altFt,5.2561);
  const svp=Math.exp(17.625*(tempF-32)*5/9/(243.04+(tempF-32)*5/9))*0.2953;
  const rho=0.002378*(P/29.921)*(518.67/Tr)*(1-0.00378*(hum/100)*svp/P);
  const dt=0.0005, g=32.174;
  let vx=mv,vy=0,x=0,y=0,t=0,zeroY=null,zeroHit=false;
  // Build check points
  const checkYds=[], results=[];
  for (let r=intervalYds; r<=maxYds; r+=intervalYds) checkYds.push(r);
  let nc=0;
  while (x<maxYds*3&&t<6&&nc<checkYds.length) {
    const v=Math.sqrt(vx*vx+vy*vy), mach=v/Cs;
    const drag=rho*interpDrag(table,mach)*v*v/(2*BC_s);
    vx+=(-drag*(vx/v))*dt; vy+=(-drag*(vy/v)-g)*dt; x+=vx*dt; y+=vy*dt; t+=dt;
    if (!zeroHit&&x/3>=zero){zeroY=y;zeroHit=true;}
    if (nc<checkYds.length&&x/3>=checkYds[nc]) {
      results.push({range:checkYds[nc],velocity:Math.round(v),drop_in:y*12,tof:t,energy:Math.round(.5*(wt/7000/32.174)*v*v*.0311)});
      nc++;
    }
  }
  if (zeroY!==null) {
    const zi=results.findIndex(r=>r.range>=zero);
    if (zi>=0) { const zd=results[zi].drop_in; results.forEach(r=>{r.drop_from_zero=r.drop_in-zd;r.moa=r.range>0?r.drop_from_zero/r.range*100/1.047:0;}); }
  }
  return results;
}

// ════════════════════════════════════════════════════
//  GARMIN CSV PARSER
// ════════════════════════════════════════════════════
function parseGarminCSV(text) {
  text = text.replace(/^\uFEFF/, '');
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  const shots = [];
  for (const line of lines) {
    const cols = line.split(',').map(s => s.trim().replace(/^"|"$/g, ''));
    const n = parseInt(cols[0]);
    const fps = parseFloat(cols[1]);
    if (!isNaN(n) && n > 0 && n < 1000 && !isNaN(fps) && fps > 100 && fps < 6000) {
      shots.push({ num: n, velocity: fps });
    }
    if (cols[0].match(/^[A-Z]/) && shots.length > 0) break;
  }
  return shots;
}

//  GROUP / CARTRIDGE GENERATION
// ════════════════════════════════════════════════════
function generateCartridges(batch) {
  const mode = batch.group_mode || 'none';
  if (mode === 'manual' && batch.groups && batch.groups.length) {
    const cartridges = [];
    batch.groups.forEach((g, gi) => {
      for (let i=0;i<(g.count||1);i++) {
        const ex = (batch.cartridges||[]).find(c=>c.group_idx===gi&&c.group_pos===i)||{};
        cartridges.push({ num:cartridges.length+1, group_idx:gi, group_pos:i, group_label:g.label||`Group ${gi+1}`, charge:ex.charge??(g.charge??batch.charge_fixed??null), coal:ex.coal??(g.coal??batch.coal??null), jump:ex.jump??(g.jump??batch.jump??null), loaded:ex.loaded??false, notes:ex.notes??'' });
      }
    });
    return cartridges;
  }
  if (mode === 'auto') {
    const total=batch.cartridge_count||10, gs=batch.auto_group_size||3, numGroups=Math.ceil(total/gs);
    const cartridges=[];
    for (let gi=0;gi<numGroups;gi++) {
      const roundsInGroup=Math.min(gs,total-gi*gs), t=numGroups>1?gi/(numGroups-1):0;
      const groupCharge=(batch.charge_min!=null&&batch.charge_max!=null)?parseFloat((batch.charge_min+t*(batch.charge_max-batch.charge_min)).toFixed(2)):(batch.charge_fixed??null);
      const groupCoal  =(batch.coal_min  !=null&&batch.coal_max  !=null)?parseFloat((batch.coal_min  +t*(batch.coal_max  -batch.coal_min  )).toFixed(4)):(batch.coal??null);
      const groupJump  =(batch.jump_min  !=null&&batch.jump_max  !=null)?parseFloat((batch.jump_min  +t*(batch.jump_max  -batch.jump_min  )).toFixed(4)):(batch.jump??null);
      for (let i=0;i<roundsInGroup;i++) {
        const ex=(batch.cartridges||[]).find(c=>c.group_idx===gi&&c.group_pos===i)||{};
        cartridges.push({ num:cartridges.length+1, group_idx:gi, group_pos:i, group_label:`Group ${gi+1}`, charge:ex.charge??groupCharge, coal:ex.coal??groupCoal, jump:ex.jump??groupJump, loaded:ex.loaded??false, notes:ex.notes??'' });
      }
    }
    return cartridges;
  }
  // flat
  const count=batch.cartridge_count||10, isLadder=batch.load_dev_type==='Charge Ladder', isSeat=batch.load_dev_type==='Seating Ladder', isJump=batch.load_dev_type==='Jump Ladder';
  const existing=batch.cartridges||[];
  return Array.from({length:count},(_,i)=>{
    const ex=existing[i]||{};
    let charge=batch.charge_fixed??null, coal=batch.coal??null, jump=batch.jump??null;
    if (isLadder&&batch.charge_min!=null){const s=count>1?(batch.charge_max-batch.charge_min)/(count-1):0;charge=parseFloat((batch.charge_min+s*i).toFixed(2));}
    if (isSeat  &&batch.charge_min!=null){const s=count>1?(batch.charge_max-batch.charge_min)/(count-1):0;coal=parseFloat((batch.charge_min+s*i).toFixed(4));}
    if (isJump  &&batch.jump_min  !=null){const s=count>1?(batch.jump_max-batch.jump_min)/(count-1):0;jump=parseFloat((batch.jump_min+s*i).toFixed(4));}
    return { num:i+1, group_idx:null, group_label:null, charge:ex.charge??charge, coal:ex.coal??coal, jump:ex.jump??jump, loaded:ex.loaded??false, notes:ex.notes??'' };
  });
}

function bookVeloForRound(batch, cart) {
  const minV=batch.rds_velo_min, maxV=batch.rds_velo_max;
  const minC=batch.rds_charge_min??batch.charge_min??batch.charge_fixed;
  const maxC=batch.rds_charge_max??batch.charge_max??batch.charge_fixed;
  if (!minV||!maxV) return null;
  if (!minC||!maxC||minC===maxC) return Math.round((minV+maxV)/2);
  const charge = cart.charge ?? minC;
  const t = Math.max(0,Math.min(1,(charge-minC)/(maxC-minC)));
  return Math.round(minV + t*(maxV-minV));
}

function adjVelo(batch, firearm, bookVelo) {
  if (!bookVelo||!firearm?.barrel_length||!batch.rds_barrel_length) return null;
  return Math.round(bookVelo + (firearm.barrel_length - batch.rds_barrel_length) * 25);
}

window.toggleCompFields = t => {
  document.getElementById('bullet-fields').style.display  = t==='bullet' ? '' : 'none';
  document.getElementById('powder-fields').style.display  = t==='powder' ? '' : 'none';
  document.getElementById('primer-fields').style.display  = t==='primer' ? '' : 'none';
  document.getElementById('case-fields').style.display    = t==='case'   ? '' : 'none';
};
window.updatePowderGrPreview = () => {
  const lbs = parseFloat(document.getElementById('comp-powder-lbs')?.value)||0;
  const gr = Math.round(lbs * 7000);
  const el = document.getElementById('comp-gr-preview');
  if (el) el.textContent = '// ' + gr.toLocaleString() + ' GR';
};
window.saveComponent = async () => {
  const type=document.getElementById('comp-type').value, name=document.getElementById('comp-name').value.trim();
  if (!name){toast('NAME REQUIRED','error');return;}
  const obj={type, name, notes:document.getElementById('comp-notes').value.trim(), fire_count:0, quantity:0, qty_loaded:0, qty_fired:0};

  if (type==='bullet') {
    obj.id_num           = document.getElementById('comp-id-num').value.trim();
    obj.lot_num          = document.getElementById('comp-lot-num').value.trim();
    obj.case_qty         = parseInt(document.getElementById('comp-case-qty').value)||0;
    obj.bullet_weight_gr = parseFloat(document.getElementById('comp-weight').value)||null;
    obj.bc_g1            = parseFloat(document.getElementById('comp-bc-g1').value)||null;
    obj.bc_g7            = parseFloat(document.getElementById('comp-bc-g7').value)||null;
    obj.sd               = parseFloat(document.getElementById('comp-sd').value)||null;
    obj.bullet_oal       = parseFloat(document.getElementById('comp-bullet-oal').value)||null;
    obj.factory_coal     = parseFloat(document.getElementById('comp-factory-coal').value)||null;
    obj.rds_coal         = parseFloat(document.getElementById('comp-rds-coal').value)||null;
  }
  if (type==='powder') {
    const lbs = parseFloat(document.getElementById('comp-powder-lbs').value)||0;
    obj.powder_lbs     = lbs;
    obj.powder_gr      = Math.round(lbs * 7000);
    obj.powder_gr_used = 0;
    obj.manufacturer   = document.getElementById('comp-mfr').value.trim();
    obj.lot_num        = document.getElementById('comp-batch-num').value.trim();
    obj.warn_gr        = parseInt(document.getElementById('comp-warn-gr').value)||1000;
  }
  if (type==='primer') {
    obj.manufacturer = document.getElementById('comp-primer-mfr').value.trim();
    obj.lot_num      = document.getElementById('comp-primer-lot').value.trim();
    obj.id_num       = document.getElementById('comp-primer-id').value.trim();
    obj.case_qty     = parseInt(document.getElementById('comp-primer-qty').value)||0;
  }
  if (type==='case') {
    obj.manufacturer = document.getElementById('comp-case-mfr').value.trim();
    obj.lot_num      = document.getElementById('comp-case-lot').value.trim();
    obj.id_num       = document.getElementById('comp-case-id').value.trim();
    obj.case_qty     = parseInt(document.getElementById('comp-case-qty2').value)||0;
    obj.trim_length  = parseFloat(document.getElementById('comp-trim').value)||null;
    obj.fire_count   = parseInt(document.getElementById('comp-fire-count').value)||0;
  }
  await dbPut('components',obj);
  document.getElementById('comp-overlay').remove();
  toast('ADDED','success');
  navigate('inventory');
};

window.updateEditPowderPreview = () => {

  const grUsed = parseInt(document.getElementById('ec-gr-used')?.value)||0;
  const remaining = Math.max(0, grTotal - grUsed);
  const el = document.getElementById('ec-gr-preview');
  if (el) el.textContent = '// ' + grTotal.toLocaleString() + ' GR TOTAL · ' + remaining.toLocaleString() + ' GR REMAINING';

window.saveEditComponent = async (id) => {

    c.powder_gr      = Math.round(lbs*7000);

    c.lot_num      = document.getElementById('ec-primer-lot')?.value.trim()||'';
    c.id_num       = document.getElementById('ec-primer-id')?.value.trim()||'';

  }
  if (c.type==='case') {

register('batches', async () => {
  setTitle('BATCHES', false, `<button class="action-btn" onclick="navigate('batches/new')">${ICONS.plus} NEW</button>`);
  const batches=await dbGetAll('batches');
  const sorted=[...batches].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  render(sorted.length===0?`
    <div class="empty-state">
      <div class="empty-icon">${ICONS.doc}</div>
      <h3>No Batches On File</h3>
      <p>Create a new batch to start tracking a load development session.</p>
      <div style="margin-top:20px">${mkBtn('NEW BATCH','btn-primary',"navigate('batches/new')","plus")}</div>
    </div>` :
    sorted.map(b=>{
      const stats=b.shots?.length?calcStats(b.shots.map(s=>s.velocity)):null;
      const isGrouped=b.group_mode&&b.group_mode!=='none';
      const badgeClass=isGrouped?'badge-grouped':b.load_dev_type==='Charge Ladder'?'badge-ladder':'';
      const badgeText=isGrouped?'GRP':b.load_dev_type==='Charge Ladder'?'LADDER':'';
      return `<div class="list-item" onclick="navigate('batch/${b.id}')">
        <div class="info"><h4>${b.id}</h4><p>${b.bullet||'—'} · ${b.powder||'—'}</p></div>
        ${badgeText?`<span class="badge ${badgeClass}">${badgeText}</span>`:''}
        ${stats&&stats.n>0?`<span class="badge badge-val mono">${Math.round(stats.avg)}</span>`:''}
        <span class="chevron">›</span>
      </div>`;
    }).join('')
  );
});

window.onBatchBulletChange = async () => {

  const inv = comps.find(c=>c.type==='bullet'&&c.name===name)||{};
  const refEl = document.getElementById('b-bullet-ref');
  const dataEl = document.getElementById('b-bullet-ref-data');
  if (!refEl||!dataEl) return;
  const fields = [
    inv.bullet_weight_gr ? `<div><div class="rc-label">Weight</div><div style="font-size:13px;font-family:'Share Tech Mono',monospace;margin-top:2px;color:var(--text)">${inv.bullet_weight_gr} gr</div></div>` : '',
    inv.sd              ? `<div><div class="rc-label">SD</div><div style="font-size:13px;font-family:'Share Tech Mono',monospace;margin-top:2px;color:var(--accent)">${inv.sd}</div></div>` : '',
    inv.bc_g1           ? `<div><div class="rc-label">BC G1</div><div style="font-size:13px;font-family:'Share Tech Mono',monospace;margin-top:2px;color:var(--accent)">${inv.bc_g1}</div></div>` : '',
    inv.bc_g7           ? `<div><div class="rc-label">BC G7</div><div style="font-size:13px;font-family:'Share Tech Mono',monospace;margin-top:2px;color:var(--accent)">${inv.bc_g7}</div></div>` : '',
    inv.bullet_oal      ? `<div><div class="rc-label">Bullet OAL</div><div style="font-size:13px;font-family:'Share Tech Mono',monospace;margin-top:2px;color:var(--text)">${inv.bullet_oal}"</div></div>` : '',
    inv.factory_coal    ? `<div><div class="rc-label">Factory COAL</div><div style="font-size:13px;font-family:'Share Tech Mono',monospace;margin-top:2px;color:var(--info)">${inv.factory_coal}"</div></div>` : '',
    inv.rds_coal        ? `<div><div class="rc-label">RDS COAL</div><div style="font-size:13px;font-family:'Share Tech Mono',monospace;margin-top:2px;color:var(--info)">${inv.rds_coal}"</div></div>` : '',
  ].filter(Boolean);
  if (fields.length) {
    dataEl.innerHTML = fields.join('');

// ── Jump step calculator ──
window.calcJumpStep = () => {
  const minJ = parseFloat(document.getElementById('b-jump-min')?.value);
  const maxJ = parseFloat(document.getElementById('b-jump-max')?.value);
  const count = parseInt(document.getElementById('b-count')?.value)||10;
  const el = document.getElementById('jump-step-preview');
  if (!el) return;
  if (!isNaN(minJ)&&!isNaN(maxJ)&&count>1) {
    const step = (maxJ-minJ)/(count-1);
    el.textContent = `// STEP: ${step.toFixed(4)}" PER ROUND · ${count} ROUNDS · ${minJ.toFixed(3)}" TO ${maxJ.toFixed(3)}"`;
  } else {
    el.textContent = '';
  }
};

      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>CBTO (auto)</label>
        <input class="form-control rs-cbto" id="rs-cbto-${idx}" type="number" inputmode="decimal" step="0.001" value="${prefill?.cbto??''}" readonly style="color:var(--accent)">
      </div>
    </div>
    <div class="form-group" style="margin-top:10px;margin-bottom:0">
      <label>Final COAL (in)</label>
      <input class="form-control rs-coal" id="rs-coal-${idx}" type="number" inputmode="decimal" step="0.001" value="${prefill?.coal??''}" placeholder="Manual override">
    </div>`;
  list.appendChild(div);
  // Run calc on load if prefill
  if (prefill?.cbto_to_lands && prefill?.jump) updateRSCalc(idx);
};

window.updateRSCalc = (idx) => {
  const lands = parseFloat(document.getElementById(`rs-cbto-lands-${idx}`)?.value);
  const jump  = parseFloat(document.getElementById(`rs-jump-${idx}`)?.value);
  const cbtoEl = document.getElementById(`rs-cbto-${idx}`);
  if (cbtoEl && !isNaN(lands) && !isNaN(jump)) {
    cbtoEl.value = (lands - jump).toFixed(3);
  }
};

function _collectBatchFields(isNew) {
  const type=document.getElementById('b-type').value;
  const isGrouped=type==='Grouped', isLadder=type==='Charge Ladder', isJump=type==='Jump Ladder';
  const autoMode=document.getElementById('auto-group-config')?.style.display!=='none';
  const gMode=isGrouped?(autoMode?'auto':'manual'):'none';
  const count=parseInt(document.getElementById(gMode==='auto'?'b-auto-total':'b-count')?.value)||10;
  // Jump ladder step calc
  const jumpMin=parseFloat(document.getElementById(isJump?'b-jump-min':'b-auto-jumpmin')?.value)||null;
  const jumpMax=parseFloat(document.getElementById(isJump?'b-jump-max':'b-auto-jumpmax')?.value)||null;
  return {
    chambering:   document.getElementById('b-chambering')?.value||'',
    bullet:       document.getElementById('b-bullet').value,
    powder:       document.getElementById('b-powder').value,
    primer:       document.getElementById('b-primer').value,
    case_brand:   document.getElementById('b-case').value,
    load_dev_type: type, group_mode: gMode,
    cartridge_count: count,
    charge_fixed: parseFloat(document.getElementById(gMode==='auto'?'b-auto-cfixed':'b-charge-fixed')?.value)||null,
    charge_min:   parseFloat(document.getElementById(gMode==='auto'?'b-auto-cmin':'b-charge-min')?.value)||null,
    charge_max:   parseFloat(document.getElementById(gMode==='auto'?'b-auto-cmax':'b-charge-max')?.value)||null,
    coal:         parseFloat(document.getElementById(gMode==='auto'?'b-auto-coalfixed':'b-coal')?.value)||null,
    coal_min:     parseFloat(document.getElementById('b-auto-coalmin')?.value)||null,
    coal_max:     parseFloat(document.getElementById('b-auto-coalmax')?.value)||null,
    jump_min:     jumpMin,
    jump_max:     jumpMax,
    jump_step:    (isJump&&jumpMin!=null&&jumpMax!=null&&count>1)?parseFloat(((jumpMax-jumpMin)/(count-1)).toFixed(4)):null,
    auto_group_size: gMode==='auto'?(parseInt(document.getElementById('b-auto-gs')?.value)||3):null,
    groups:       gMode==='manual'?collectManualGroups():null,
    rifle_seating: collectRifleSeating(),
    // Firearm id from first rifle seating block for backward compat
    firearm_id:   collectRifleSeating()[0]?.firearm_id||'',
    rds_source:   document.getElementById('b-rds').value.trim(),
    rds_barrel_length: parseFloat(document.getElementById('b-rds-bl').value)||null,
    rds_velo_min: parseFloat(document.getElementById('b-rds-vmin').value)||null,
    rds_velo_max: parseFloat(document.getElementById('b-rds-vmax').value)||null,
    rds_charge_min: parseFloat(document.getElementById('b-rds-cmin').value)||null,
    rds_charge_max: parseFloat(document.getElementById('b-rds-cmax').value)||null,
    loaded_date:  document.getElementById('b-ldate').value,
    notes:        document.getElementById('b-notes').value.trim(),
  };
}
window.saveBatch = async () => {
  const fields=_collectBatchFields(true);
  if (!fields.chambering||!fields.bullet||!fields.powder){toast('CHAMBERING, BULLET & POWDER REQUIRED','error');return;}
  const chargeStr=fields.charge_min?`${fields.charge_min}-${fields.charge_max}`:fields.charge_fixed;
  let id=genBatchId(fields.chambering,fields.bullet,fields.load_dev_type,chargeStr);
  if (await dbGet('batches',id)) id+='-'+Date.now().toString(36);
  const batch={...fields, id, shots:[], created_at:new Date().toISOString()};
  await dbPut('batches',batch); toast('BATCH CREATED','success'); navigate('batch/'+id);
};
window.updateBatch = async batchId => {
  const batch=await dbGet('batches',batchId);
  if (!batch) return;
  const fields=_collectBatchFields(false);
  if (!fields.chambering||!fields.bullet||!fields.powder){toast('CHAMBERING, BULLET & POWDER REQUIRED','error');return;}
  Object.assign(batch, fields);
  await dbPut('batches',batch); toast('BATCH UPDATED','success'); navigate('batch/'+batchId);
};

function renderLoadTable(batch) {
  const el=document.getElementById('tab-load'); if (!el) return;
  const cartridges=generateCartridges(batch);
  const loaded=cartridges.filter(c=>c.loaded).length, total=cartridges.length;
  const pct=total>0?Math.round(loaded/total*100):0;
  const isGrouped=batch.group_mode&&batch.group_mode!=='none';
  let rows='', lastGroup=null;
  cartridges.forEach((c,i)=>{
    if (isGrouped&&c.group_label&&c.group_label!==lastGroup) {
      rows+=`<tr class="group-header-row"><td colspan="6"><div class="group-header-label">${c.group_label}</div><div class="group-header-params">${c.charge!=null?c.charge+' gr':''}${c.coal!=null?' · COAL '+fmt(c.coal,3)+'"':''}${c.jump!=null?' · JUMP '+fmt(c.jump,3)+'"':''}</div></td></tr>`;
      lastGroup=c.group_label;
    }
    rows+=`<tr id="lt-row-${i}" class="${c.loaded?'lt-done-row':''}">
      <td class="lt-done"><label class="lt-checkbox"><input type="checkbox" ${c.loaded?'checked':''} onchange="toggleLoaded('${batch.id}',${i},this.checked)"><span class="lt-checkmark"></span></label></td>
      <td class="lt-num">${c.num}</td>
      <td class="lt-charge">${c.charge!=null?c.charge:'—'}</td>
      <td style="font-family:'Share Tech Mono',monospace;font-size:14px">${c.coal!=null?fmt(c.coal,3):'—'}</td>
      <td style="font-family:'Share Tech Mono',monospace;font-size:14px">${c.jump!=null?fmt(c.jump,3):'—'}</td>
      <td><input class="lt-note-input" placeholder="notes..." value="${c.notes||''}" onblur="saveCartridgeNote('${batch.id}',${i},this.value)"></td>
    </tr>`;
  });
  // Step delta info for ladder types
  const isChargeLadder  = batch.load_dev_type==='Charge Ladder';
  const isJumpLadder    = batch.load_dev_type==='Jump Ladder';
  const isSeatLadder    = batch.load_dev_type==='Seating Ladder';
  let stepInfo = '';
  if ((isChargeLadder||isJumpLadder||isSeatLadder) && cartridges.length>1) {
    if (isChargeLadder && batch.charge_min!=null && batch.charge_max!=null) {
      const step=((batch.charge_max-batch.charge_min)/(cartridges.length-1)).toFixed(2);
      stepInfo=`<div style="font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--accent);margin-top:8px">// CHARGE LADDER · +${step} GR PER STEP · ${batch.charge_min} → ${batch.charge_max} GR</div>`;
    } else if (isJumpLadder && batch.jump_min!=null && batch.jump_max!=null) {
      const step=((batch.jump_max-batch.jump_min)/(cartridges.length-1)).toFixed(4);
      stepInfo=`<div style="font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--accent);margin-top:8px">// JUMP LADDER · +${step}" PER STEP · ${batch.jump_min}" → ${batch.jump_max}"</div>`;
    } else if (isSeatLadder && batch.coal_min!=null && batch.coal_max!=null) {
      const step=((batch.coal_max-batch.coal_min)/(cartridges.length-1)).toFixed(4);
      stepInfo=`<div style="font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--accent);margin-top:8px">// SEATING LADDER · +${step}" COAL PER STEP · ${batch.coal_min}" → ${batch.coal_max}"</div>`;
    } else if (batch.jump_step) {
      stepInfo=`<div style="font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--accent);margin-top:8px">// JUMP LADDER · ${batch.jump_step}" PER STEP</div>`;
    }
  }

  el.innerHTML=`
    <div class="card" style="margin-bottom:12px"><div class="card-header"><div class="marker"></div><h3>Batch Status</h3></div><div class="card-body">
      <div class="stat-grid">
        <div class="stat-box"><div class="s-label">Total</div><div class="s-val">${total}</div></div>
        <div class="stat-box" style="border-top-color:var(--success)"><div class="s-label">Loaded</div><div class="s-val" style="color:var(--success)">${loaded}</div></div>
        <div class="stat-box" style="border-top-color:${total-loaded>0?'var(--accent)':'var(--success)'}"><div class="s-label">Remaining</div><div class="s-val" style="color:${total-loaded>0?'var(--accent)':'var(--success)'}">${total-loaded}</div></div>
      </div>
      <div style="margin-top:12px;background:var(--surface2);border:1px solid var(--border);height:8px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:var(--success);transition:width .3s"></div>
      </div>
      ${stepInfo}
    </div></div>
    <div class="btn-group" style="margin-bottom:12px">
      ${mkBtnSm('RESET','btn-secondary',`resetLoadTable('${batch.id}')`, 'reset')}
      ${mkBtnSm('ALL LOADED','btn-secondary',`checkAllLoaded('${batch.id}')`, 'check')}
    </div>
    <div class="card"><div class="card-header"><div class="marker"></div><h3>Bench Reference</h3><div class="hdr-tag">${batch.bullet||'—'} · ${batch.powder||'—'}</div></div>
      <div style="overflow-x:auto"><table class="load-bench-table">
        <thead><tr><th></th><th>#</th><th>Charge</th><th>COAL"</th><th>Jump"</th><th>Notes</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
}

window.toggleLoaded = async (batchId,idx,checked) => {
  const batch=await dbGet('batches',batchId);
  if (!batch.cartridges) batch.cartridges=generateCartridges(batch);
  batch.cartridges[idx]=batch.cartridges[idx]||{};
  const wasLoaded = batch.cartridges[idx].loaded || false;
  batch.cartridges[idx].loaded=checked;
  await dbPut('batches',batch);
  const row=document.getElementById(`lt-row-${idx}`); if (row) row.className=checked?'lt-done-row':'';

  // Deduct or restore powder when a round is checked/unchecked
  if (batch.powder) {
    const cartridges = generateCartridges(batch);
    const c = cartridges[idx];
    const chargeGr = c.charge ?? batch.charge_fixed ?? null;
    if (chargeGr != null) {
      const comps = await dbGetAll('components');
      const powderComp = comps.find(p => p.type==='powder' && p.name===batch.powder);
      if (powderComp && powderComp.powder_gr != null) {
        const delta = checked ? chargeGr : -chargeGr;
        powderComp.powder_gr_used = Math.max(0, (powderComp.powder_gr_used||0) + delta);
        await dbPut('components', powderComp);
        // Show feedback if low
        const remaining = Math.max(0, (powderComp.powder_gr||0) - powderComp.powder_gr_used);
        if (remaining < (powderComp.warn_gr||1000) && checked) {
          toast(`${batch.powder}: ${remaining.toLocaleString()} GR REMAINING`, 'error');
        }
      }
    }
  }
};

      <div class="stat-box" style="border-top-color:var(--success)"><div class="s-label">SD</div><div class="s-val" style="color:var(--success)">${fmt(stats.sd,1)}</div><div class="s-unit">FPS</div></div>
      <div class="stat-box"><div class="s-label">ES</div><div class="s-val">${fmt(stats.es,1)}</div><div class="s-unit">FPS</div></div>
    </div>
    <div class="card"><div class="card-header"><div class="marker"></div><h3>Shot Data</h3>${mkBtnSm('CLEAR','btn-secondary',`clearShots('${batch.id}')`, 'trash')}</div>
      <div style="padding:0 0 4px"><table class="shot-table">
        <thead><tr><th>#</th><th>FPS</th><th>Δ AVG</th><th>Notes</th></tr></thead>

      </table></div>
    </div>` :
    `<p class="text-muted" style="font-size:14px;margin-bottom:16px;font-family:'Share Tech Mono',monospace">// NO VELOCITY DATA — USE RANGE CARD TO RECORD SHOTS</p>`;
  el.innerHTML+=`<div style="margin-top:12px">${mkBtn('OPEN RANGE CARD','btn-primary',`navigate('range-card/${batch.id}')`, 'range')}</div>
    ${batch.range_date?`<p class="text-muted" style="font-size:12px;margin-top:10px;font-family:'Share Tech Mono',monospace">// RANGE DATE: ${fmtDate(batch.range_date)}</p>`:''}`;
}
window.clearShots = async batchId => {
  if (!confirm_('Clear all shot data?')) return;
  const batch=await dbGet('batches',batchId);
  batch.shots=[]; batch.range_date=null;
  await dbPut('batches',batch); renderChronoTab(batch); toast('SHOTS CLEARED');

async function renderDropTab(batch) {
  const el=document.getElementById('tab-drop'); if (!el) return;
  const stats=batch.shots?.length?calcStats(batch.shots.filter(s=>s.velocity>0).map(s=>s.velocity)):null;
  const inv=await getBulletData(batch.bullet);

  // BC priority: batch stored > inventory G1 > inventory G7
  const invBcG1 = batch.bc_g1||inv.bc_g1||null;
  const invBcG7 = inv.bc_g7||null;
  // Default to G1 if available, G7 if only G7 exists
  const defaultBcType = invBcG1 ? 'G1' : (invBcG7 ? 'G7' : 'G1');
  const defaultBc     = defaultBcType==='G1' ? invBcG1 : invBcG7;
  const rWt = batch.bullet_weight_gr||inv.bullet_weight_gr||null;

  // Source label for BC
  const bcSrc = batch.bc_g1 ? 'batch' : (inv.bc_g1||inv.bc_g7) ? 'inventory' : null;

  el.innerHTML=`
    <div class="section-title">Ballistic Coefficient</div>
    <div style="display:flex;gap:8px;margin-bottom:10px" id="bc-type-toggle">
      <button class="btn btn-secondary btn-sm" id="bc-btn-G1" onclick="setBCType('G1')" style="${defaultBcType==='G1'?'border-color:var(--accent);color:var(--accent)':''}">G1</button>
      <button class="btn btn-secondary btn-sm" id="bc-btn-G7" onclick="setBCType('G7')" style="${defaultBcType==='G7'?'border-color:var(--accent);color:var(--accent)':''}">G7</button>
    </div>
    <div class="form-row" style="margin-bottom:4px">
      <div class="form-group">
        <label>BC Value <span id="bc-type-label" style="color:var(--accent)">${defaultBcType}</span></label>
        <input class="form-control" id="drop-bc" type="number" step="0.001" value="${defaultBc||''}">
        ${bcSrc?`<div style="font-size:11px;color:var(--muted2);margin-top:4px;font-family:'Share Tech Mono',monospace">// AUTO-FILLED FROM ${bcSrc.toUpperCase()} · ${defaultBcType}</div>`:''}
      </div>
      <div class="form-group">
        <label>Bullet Wt (gr)</label>
        <input class="form-control" id="drop-wt" type="number" step="0.1" value="${rWt||''}">
        ${(batch.bullet_weight_gr||inv.bullet_weight_gr)?`<div style="font-size:11px;color:var(--muted2);margin-top:4px;font-family:'Share Tech Mono',monospace">// AUTO-FILLED</div>`:''}
      </div>
    </div>

    <div class="section-title">Environmental</div>
    <div class="env-strip">
      <div><label>Temp °F</label><input type="number" id="env-temp" value="${batch.range_conditions?.temp_f||59}"></div>
      <div><label>Alt ft</label><input type="number" id="env-alt" value="${batch.range_conditions?.elevation||0}"></div>
      <div><label>Humidity %</label><input type="number" id="env-hum" value="${batch.range_conditions?.humidity||50}"></div>
    </div>

    <div class="section-title">Table Settings</div>
    <div class="form-row three" style="margin-bottom:14px">
      <div class="form-group">
        <label>Zero (yds)</label>
        <input class="form-control" id="env-zero" type="number" value="100">
      </div>
      <div class="form-group">
        <label>Max Range (yds)</label>
        <input class="form-control" id="env-max-range" type="number" value="1000">
      </div>
      <div class="form-group">
        <label>Interval (yds)</label>
        <input class="form-control" id="env-interval" type="number" value="100">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label>MV (fps)</label>
      <input class="form-control" id="env-mv" type="number" value="${stats?Math.round(stats.avg):''}" placeholder="from chrono">
      ${stats?`<div style="font-size:11px;color:var(--muted2);margin-top:4px;font-family:'Share Tech Mono',monospace">// AUTO-FILLED FROM CHRONO: ${Math.round(stats.avg)} FPS AVG</div>`:''}
    </div>

    ${mkBtn('COMPUTE DROP TABLE','btn-primary',`recomputeDrop('${batch.id}')`, '')}
    <div id="drop-table-result" style="margin-top:14px"></div>`;

  // Store BC type state on the element
  el._bcType = defaultBcType;
  el._invBcG1 = invBcG1;
  el._invBcG7 = invBcG7;
  el._batchBcG1 = batch.bc_g1||null;
}

window.setBCType = (type) => {
  const el = document.getElementById('tab-drop');
  if (!el) return;
  el._bcType = type;
  // Update toggle buttons
  ['G1','G7'].forEach(t => {
    const b = document.getElementById(`bc-btn-${t}`);
    if (b) b.style.cssText = t===type ? 'border-color:var(--accent);color:var(--accent)' : '';
  });
  // Update label
  const lbl = document.getElementById('bc-type-label');
  if (lbl) lbl.textContent = type;
  // Auto-fill BC from inventory for this type
  const bcInput = document.getElementById('drop-bc');
  if (!bcInput) return;
  const batchVal = el._batchBcG1;
  const invG1 = el._invBcG1, invG7 = el._invBcG7;
  if (type==='G1') {
    if (batchVal||invG1) bcInput.value = batchVal||invG1;
  } else {
    if (invG7) bcInput.value = invG7;
    else if (batchVal||invG1) bcInput.value = ''; // don't use G1 value for G7 slot
  }
};
window.recomputeDrop = async batchId => {
  const batch=await dbGet('batches',batchId), inv=await getBulletData(batch.bullet);
  const stats=batch.shots?.length?calcStats(batch.shots.filter(s=>s.velocity>0).map(s=>s.velocity)):null;
  const tabEl = document.getElementById('tab-drop');
  const bcType = tabEl?._bcType || 'G1';
  const mv   = parseFloat(document.getElementById('env-mv')?.value)||stats?.avg;
  const bc   = parseFloat(document.getElementById('drop-bc')?.value);
  const wt   = parseFloat(document.getElementById('drop-wt')?.value)||batch.bullet_weight_gr||inv.bullet_weight_gr;
  const temp = parseFloat(document.getElementById('env-temp')?.value)||59;
  const alt  = parseFloat(document.getElementById('env-alt')?.value)||0;
  const hum  = parseFloat(document.getElementById('env-hum')?.value)||50;
  const zero = parseFloat(document.getElementById('env-zero')?.value)||100;
  const maxR = parseFloat(document.getElementById('env-max-range')?.value)||1000;
  const intv = parseFloat(document.getElementById('env-interval')?.value)||100;
  const resultEl = document.getElementById('drop-table-result');
  if (!mv||!bc||!wt){resultEl.innerHTML=`<p style="font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--muted2)">// ENTER MV, BC ${bcType}, AND BULLET WEIGHT TO COMPUTE</p>`;return;}
  if (intv<25||intv>500){resultEl.innerHTML=`<p style="color:var(--danger);font-family:'Share Tech Mono',monospace;font-size:13px">// INTERVAL MUST BE 25–500 YDS</p>`;return;}
  if (maxR<100||maxR>2000){resultEl.innerHTML=`<p style="color:var(--danger);font-family:'Share Tech Mono',monospace;font-size:13px">// MAX RANGE MUST BE 100–2000 YDS</p>`;return;}
  const rows=computeDropTable(mv,bc,wt,temp,alt,hum,zero,maxR,intv,bcType);
  if (!rows?.length){resultEl.innerHTML=`<p style="color:var(--danger);font-family:'Share Tech Mono',monospace">// COMPUTATION FAILED — CHECK INPUTS</p>`;return;}
  resultEl.innerHTML=`
    <div class="card">
      <div class="card-header">
        <div class="marker"></div>
        <h3>Drop Table</h3>
        <div class="hdr-tag">BC ${bcType}: ${bc}</div>
        <div class="hdr-tag" style="margin-left:4px">ZERO: ${zero} YDS</div>
      </div>
      <div style="overflow-x:auto"><table class="drop-table">
        <thead><tr><th>Range</th><th>Vel</th><th>Drop"</th><th>MOA</th><th>MILS</th><th>ft·lb</th></tr></thead>
        <tbody>${rows.map(r=>`<tr class="${r.range===zero?'zero-row':''}">
          <td>${r.range} yd</td>
          <td>${r.velocity}</td>
          <td>${r.drop_from_zero!=null?fmt(r.drop_from_zero,1):'—'}</td>
          <td>${r.moa!=null?fmt(r.moa,2):'—'}</td>
          <td>${r.moa!=null?fmt(r.moa/3.438,2):'—'}</td>
          <td>${r.energy}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:8px;font-family:'Share Tech Mono',monospace">// BC ${bcType}: ${bc} · MV: ${Math.round(mv)} FPS · ${wt} GR · ${temp}°F / ${alt}FT / ${hum}%RH · ${intv}YD INTERVALS</p>`;
};
window.deleteBatch = async batchId => {
  if (!confirm_(`Delete batch ${batchId}?`)) return;
  await dbDelete('batches',batchId); toast('DELETED'); navigate('batches');
};

let _rcSession = { batchId:null, cartridges:[], shots:[] };

routes['range-card'] = async ({id}) => {
  if (!id){navigate('batches');return;}
  const batch=await dbGet('batches',id);
  if (!batch){toast('BATCH NOT FOUND','error');navigate('batches');return;}
  const firearms=await dbGetAll('firearms');

  setTitle('RANGE CARD', true, `<button class="action-btn" onclick="commitRangeSession('${id}')">${ICONS.save} SAVE</button>`);
  document.getElementById('back-btn').onclick=()=>{ if (confirm_('Leave? Unsaved changes will be lost.')) navigate('batch/'+id); };

  const cartridges=generateCartridges(batch);
  const existingShots=batch.shots||[];
  const isGrouped=batch.group_mode&&batch.group_mode!=='none';

  // Init session
  _rcSession = {
    batchId: id,
    cartridges,
    shots: cartridges.map((_,i)=>{ const e=(batch.shots||[])[i]; return {velocity:e?.velocity||0,field_notes:e?.field_notes||''}; }),
  };

  const fOpts=firearms.map(f=>{const bl=f.barrel_length?(f.barrel_length+'in'):'?in';return `<option value="${f.name}" ${f.name===batch.firearm_id?'selected':''}>${f.name} (${bl})</option>`;}).join('');

  let shotRowsHtml='', lastGroup=null;

    const existing=existingShots[i];
    const hasVelo=existing&&existing.velocity>0;
    const veloVal=hasVelo?Math.round(existing.velocity):'';
    if (isGrouped&&c.group_label&&c.group_label!==lastGroup) {
      shotRowsHtml+=`<div class="rc-group-header"><div class="rc-group-title">${c.group_label}</div><div class="rc-group-params">${c.charge!=null?c.charge+' gr':''}${c.coal!=null?' · '+fmt(c.coal,3)+'"':''}${c.jump!=null?' · jump '+fmt(c.jump,3)+'"':''}</div></div>`;
      lastGroup=c.group_label;
    }
    shotRowsHtml+=`
    <div class="rc-shot-row ${hasVelo?'has-velo':''}" id="rc-row-${i}" onclick="openShotDetail('${id}',${i})">
      <div class="rc-shot-num ${hasVelo?'fired':''}" id="rc-num-${i}">${c.num}</div>
      <div class="rc-shot-info">
        <div class="rc-shot-charge">${c.charge!=null?c.charge+' gr':batch.charge_fixed!=null?batch.charge_fixed+' gr':'—'}</div>
        <div class="rc-shot-sub">${[c.coal!=null?'COAL '+fmt(c.coal,3)+'"':null,c.jump!=null?'JUMP '+fmt(c.jump,3)+'"':null].filter(Boolean).join(' · ')||batch.bullet||''}</div>
      </div>
      <div class="rc-shot-right">
        <div class="rc-velo-display ${hasVelo?'has-val':''}" id="rc-velo-disp-${i}">${veloVal||'—'}</div>
        <div class="rc-velo-unit">fps</div>
        <div class="rc-tap-hint">TAP TO ENTER</div>
      </div>
    </div>`;
  });

  render(`
    <div style="background:var(--surface);border:1px solid var(--border);overflow:hidden">

      <div class="rc-session-header">
        <h2>${batch.id}</h2>
        <div class="rc-meta">${batch.load_dev_type}${isGrouped?' · '+batch.group_mode.toUpperCase()+' GROUPS':''} · ${cartridges.length} ROUNDS · ${fmtDate(batch.loaded_date)}</div>
      </div>

      <!-- Firearm + Date -->
      <div style="display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)">
        <div style="padding:10px 14px;border-right:1px solid var(--border)">
          <div class="rc-label">Firearm</div>
          <select class="form-control" id="rc-firearm-sel" style="padding:7px 10px;font-size:14px;margin-top:5px;border-radius:0;border-left-width:2px" onchange="onRangeFirearmChange('${id}')">
            ${fOpts}
          </select>
        </div>
        <div style="padding:10px 14px">
          <div class="rc-label">Range Date</div>
          <input class="form-control" id="rc-range-date" type="date" value="${batch.range_date||new Date().toISOString().slice(0,10)}" style="padding:7px 10px;font-size:14px;margin-top:5px;border-radius:0;border-left-width:2px">
        </div>
      </div>

      <!-- Recipe strip -->
      <div class="rc-recipe-strip">
        <div><div class="rc-label">Bullet</div><div class="rc-val">${batch.bullet||'—'}</div></div>
        <div><div class="rc-label">Powder</div><div class="rc-val">${batch.powder||'—'}</div></div>
        <div><div class="rc-label">Primer · Case</div><div class="rc-val" style="font-size:12px">${batch.primer||'—'} · ${batch.case_brand||'—'}</div></div>
      </div>

      <!-- RDS / Barrel info -->
      <div class="rc-rds-bar" id="rc-rds-bar"></div>

      <!-- Environmental inputs -->
      <div class="rc-env-strip">
        <div class="rc-env-cell">
          <label>Temp °F</label>
          <input id="rc-env-temp" type="number" inputmode="numeric" value="${batch.range_conditions?.temp_f||59}">
        </div>
        <div class="rc-env-cell">
          <label>Humidity %</label>
          <input id="rc-env-hum" type="number" inputmode="numeric" value="${batch.range_conditions?.humidity||50}">
        </div>
        <div class="rc-env-cell">
          <label>Elevation ft</label>
          <input id="rc-env-elev" type="number" inputmode="numeric" value="${batch.range_conditions?.elevation||0}">
        </div>
      </div>

      <!-- Import bar -->
      <div class="rc-import-bar">
        <button class="btn btn-secondary btn-sm" style="flex:1" onclick="showRangeCSVImport('${id}')">${ICONS.csv} GARMIN CSV</button>
        <div style="font-size:10px;color:var(--muted2);text-align:right;flex:1;letter-spacing:1px;font-family:'Share Tech Mono',monospace">TAP ROUND<br>TO ENTER DATA</div>
      </div>

      <!-- Live stats -->
      <div class="rc-live-stats" id="rc-live-stats">
        <div class="stat-grid">
          <div class="stat-box hi"><div class="s-label">AVG</div><div class="s-val" id="rc-stat-avg">—</div><div class="s-unit">FPS</div></div>
          <div class="stat-box" style="border-top-color:var(--success)"><div class="s-label">SD</div><div class="s-val" id="rc-stat-sd" style="color:var(--success)">—</div><div class="s-unit">FPS</div></div>
          <div class="stat-box"><div class="s-label">ES</div><div class="s-val" id="rc-stat-es">—</div><div class="s-unit">FPS</div></div>
        </div>
      </div>

      <!-- Shot rows -->
      <div id="rc-shot-rows">${shotRowsHtml}</div>

      <!-- Commit -->
      <div class="rc-commit-bar">
        ${mkBtn('SAVE TO BATCH','btn-primary',`commitRangeSession('${id}')`, 'save')}
      </div>

    </div>
  `);

  const fa = firearms.find(f=>f.name===batch.firearm_id)||null;
  updateRangeRDSBar(batch, fa);
  updateRangeLiveStats();
};

function updateRangeRDSBar(batch, firearm) {
  const el=document.getElementById('rc-rds-bar'); if (!el) return;
  const rdsBarrel=batch.rds_barrel_length, faBarrel=firearm?.barrel_length;
  const diff=faBarrel&&rdsBarrel?(faBarrel-rdsBarrel):null;
  const adjLabel=diff!=null?`${diff>=0?'+':''}${diff}" (${diff>=0?'+':''}${Math.round(diff*25)} fps)`:'—';
  el.innerHTML=`<div style="display:flex;gap:20px;flex-wrap:wrap">
    <div><div class="rc-label">RDS Source</div><div style="font-size:13px;font-weight:700;color:var(--text);margin-top:2px;font-family:'Share Tech Mono',monospace">${batch.rds_source||'—'}</div></div>
    <div><div class="rc-label">RDS Barrel</div><div style="font-size:13px;font-weight:700;color:var(--text);margin-top:2px;font-family:'Share Tech Mono',monospace">${rdsBarrel?rdsBarrel+'"':'—'}</div></div>
    <div><div class="rc-label">Your Barrel</div><div style="font-size:13px;font-weight:700;color:var(--text);margin-top:2px;font-family:'Share Tech Mono',monospace">${faBarrel?faBarrel+'"':'—'}</div></div>
    <div><div class="rc-label">Barrel Adj</div><div style="font-size:13px;font-weight:700;margin-top:2px;font-family:'Share Tech Mono',monospace;color:${diff!=null?(diff>=0?'var(--success)':'var(--danger)'):'var(--muted2)'}">${adjLabel}</div></div>
  </div>`;
}
window.onRangeFirearmChange = async batchId => {

  const firearms=await dbGetAll('firearms');
  updateRangeRDSBar(batch, firearms.find(f=>f.name===sel.value)||null);
};

window.onDetVeloInput = idx => {
  const input=document.getElementById('det-velo-input'); if (!input) return;
  const v=parseFloat(input.value), hasVal=!isNaN(v)&&v>0;
  input.classList.toggle('filled',hasVal);
  document.getElementById('det-velo-wrap')?.classList.toggle('filled',hasVal);
  if (!_rcSession.shots[idx]) _rcSession.shots[idx]={velocity:0,field_notes:''};
  _rcSession.shots[idx].velocity=hasVal?v:0;
  updateRangeLiveStats();
};

function _saveShotDetailToSession(idx) {
  const veloEl=document.getElementById('det-velo-input');
  const notesEl=document.getElementById('det-notes-input');
  if (!_rcSession.shots[idx]) _rcSession.shots[idx]={velocity:0,field_notes:''};
  if (veloEl){const v=parseFloat(veloEl.value);_rcSession.shots[idx].velocity=(!isNaN(v)&&v>0)?v:0;}
  if (notesEl) _rcSession.shots[idx].field_notes=notesEl.value.trim();
  const v=_rcSession.shots[idx].velocity;
  const disp=document.getElementById(`rc-velo-disp-${idx}`);
  const numEl=document.getElementById(`rc-num-${idx}`);
  const rowEl=document.getElementById(`rc-row-${idx}`);
  if (disp){disp.textContent=v>0?Math.round(v):'—';disp.classList.toggle('has-val',v>0);}
  if (numEl) numEl.classList.toggle('fired',v>0);
  if (rowEl) rowEl.classList.toggle('has-velo',v>0);
}
window.navShotDetail = newIdx => { _saveShotDetailToSession(window._currentDetailIdx); updateRangeLiveStats(); document.getElementById('shot-detail-overlay')?.remove(); openShotDetail(window._currentDetailBatchId,newIdx); };
window.saveShotDetail = idx => { _saveShotDetailToSession(idx); updateRangeLiveStats(); document.getElementById('shot-detail-overlay')?.remove(); };
window.saveShotDetailAndNext = idx => { _saveShotDetailToSession(idx); updateRangeLiveStats(); document.getElementById('shot-detail-overlay')?.remove(); if (idx+1<(window._currentDetailCartridges?.length||0)) openShotDetail(window._currentDetailBatchId,idx+1); };
window.closeShotDetail = () => { if (window._currentDetailIdx!=null) _saveShotDetailToSession(window._currentDetailIdx); updateRangeLiveStats(); document.getElementById('shot-detail-overlay')?.remove(); };

function updateRangeLiveStats() {
  const velos=(_rcSession.shots||[]).map(s=>s.velocity).filter(v=>v>0);
  const avgEl=document.getElementById('rc-stat-avg'), sdEl=document.getElementById('rc-stat-sd'), esEl=document.getElementById('rc-stat-es');
  if (!velos.length){if(avgEl)avgEl.textContent='—';if(sdEl)sdEl.textContent='—';if(esEl)esEl.textContent='—';return;}
  const s=calcStats(velos);
  if(avgEl)avgEl.textContent=Math.round(s.avg);
  if(sdEl) sdEl.textContent=fmt(s.sd,1);
  if(esEl) esEl.textContent=fmt(s.es,1);
}

window.commitRangeSession = async batchId => {
  const batch=await dbGet('batches',batchId);
  const cartridges=generateCartridges(batch);
  const shots=cartridges.map((_,i)=>{
    const s=_rcSession.shots[i]||{velocity:0,field_notes:''};
    const c=cartridges[i];
    const shot={velocity:s.velocity||0,field_notes:s.field_notes||''};
    if (c.charge!=null) shot.charge=c.charge;
    return shot;
  });
  const validShots=shots.filter(s=>s.velocity>0);
  if (!validShots.length){toast('NO VELOCITIES ENTERED','error');return;}
  const rangeDate=document.getElementById('rc-range-date')?.value||new Date().toISOString().slice(0,10);
  const sel=document.getElementById('rc-firearm-sel'); if (sel&&sel.value) batch.firearm_id=sel.value;
  batch.range_conditions={
    temp_f:    parseFloat(document.getElementById('rc-env-temp')?.value)||59,
    humidity:  parseFloat(document.getElementById('rc-env-hum')?.value)||50,
    elevation: parseFloat(document.getElementById('rc-env-elev')?.value)||0,
  };
  batch.shots=shots; batch.range_date=rangeDate;
  await dbPut('batches',batch);
  _rcSession={batchId:null,cartridges:[],shots:[]};
  toast(`${validShots.length} SHOTS SAVED`,'success');
  if (batch.case_brand) promptFireCount(batch.case_brand);
  navigate('batch/'+batchId);
};

window.showRangeCSVImport = batchId => {
  document.body.insertAdjacentHTML('beforeend',`
    <div class="overlay" id="rc-csv-overlay" onclick="if(event.target===this)this.remove()">
      <div class="modal"><div class="modal-handle"></div>

        <div class="form-group"><label>CSV Data</label><textarea class="form-control" id="rc-csv-text" style="min-height:160px;font-family:'Share Tech Mono',monospace;font-size:12px" placeholder="SHOT #,SPEED (FPS),..."></textarea></div>
        <div class="btn-group">
          ${mkBtn('APPLY TO CARD','btn-primary',`applyGarminCSVToCard('${batchId}')`, 'csv')}

window.applyGarminCSVToCard = async batchId => {
  const text=document.getElementById('rc-csv-text').value;
  const shots=parseGarminCSV(text);
  if (!shots.length){toast('NO VALID SHOT DATA FOUND','error');return;}
  shots.forEach((s,i)=>{
    if (i>=_rcSession.shots.length) return;
    _rcSession.shots[i].velocity=s.velocity;
    const disp=document.getElementById(`rc-velo-disp-${i}`);
    if (disp){disp.textContent=Math.round(s.velocity);disp.classList.add('has-val');}

  updateRangeLiveStats();
  toast(`${shots.length} SHOTS LOADED`,'success');
};

window.exportData = async () => {
  try {
    const [firearms,components,batches]=await Promise.all([dbGetAll('firearms'),dbGetAll('components'),dbGetAll('batches')]);
    const payload={version:2,app:'ReloadingMaster',exported_at:new Date().toISOString(),firearms,components,batches};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const date=new Date().toISOString().slice(0,10), filename=`reloading-master-${date}.json`;
    if (navigator.share){try{const file=new File([blob],filename,{type:'application/json'});await navigator.share({files:[file],title:'Reloading Master Export'});toast('EXPORTED','success');return;}catch(e){if(e.name==='AbortError')return;}}
    const url=URL.createObjectURL(blob), a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    toast(`EXPORTED: ${batches.length} BATCHES`,'success');
  } catch(err){toast('EXPORT FAILED: '+err.message,'error');}
};

window.handleJSONFile = e => { if (e.target.files[0]) handleJSONDroppedFile(e.target.files[0]); };
window.handleJSONDroppedFile = file => { if (!file) return; const r=new FileReader(); r.onload=e=>processJSONImport(e.target.result); r.readAsText(file); };
async function processJSONImport(text) {
  const result=document.getElementById('import-result'); const log=[];
  result.innerHTML=`<div class="import-log">// PROCESSING...</div>`;
  try {
    const data=JSON.parse(text);
    if (!data.app||data.app!=='ReloadingMaster'){result.innerHTML=`<div class="import-log"><div class="err">// NOT A VALID EXPORT FILE</div></div>`;return;}
    let fA=0,fS=0; for (const f of(data.firearms||[])){const ex=await dbGetAll('firearms').then(fs=>fs.find(x=>x.name===f.name));if(ex){fS++;continue;}const{id:_,...r}=f;await dbPut('firearms',r);fA++;}
    log.push(`<div class="ok">// FIREARMS: ${fA} ADDED, ${fS} SKIPPED</div>`);
    let cA=0,cS=0; for (const c of(data.components||[])){const ex=await dbGetAll('components').then(cs=>cs.find(x=>x.type===c.type&&x.name===c.name));if(ex){cS++;continue;}const{id:_,...r}=c;await dbPut('components',r);cA++;}
    log.push(`<div class="ok">// COMPONENTS: ${cA} ADDED, ${cS} SKIPPED</div>`);
    let bA=0,bS=0; for (const b of(data.batches||[])){const ex=await dbGet('batches',b.id);if(ex){bS++;continue;}await dbPut('batches',b);bA++;}
    log.push(`<div class="ok">// BATCHES: ${bA} ADDED, ${bS} SKIPPED</div>`);
    log.push(`<div class="ok">// IMPORT COMPLETE</div>`);
    result.innerHTML=`<div class="import-log">${log.join('')}</div><div style="margin-top:12px">${mkBtn('GO TO DASHBOARD','btn-primary',"navigate('dashboard')")}</div>`;
    toast('IMPORT COMPLETE','success');
  } catch(err){result.innerHTML=`<div class="import-log"><div class="err">// ERROR: ${err.message}</div></div>`;}
}

window.handleFile = e => { if (e.target.files[0]) handleDroppedFile(e.target.files[0]); };
window.handleDroppedFile = file => { const r=new FileReader(); r.onload=e=>processXLSX(e.target.result); r.readAsArrayBuffer(file); };
async function processXLSX(buffer) {
  const result=document.getElementById('import-result'); const log=[];
  result.innerHTML=`<div class="import-log">// PROCESSING...</div>`;
  try {
    const wb=XLSX.read(buffer,{type:'array'});
    const faSheet=wb.Sheets['Firearm Data'];
    if (faSheet){const rows=XLSX.utils.sheet_to_json(faSheet,{defval:null});let n=0;for (const r of rows){const name=r['Firearm ID'];if(!name)continue;const ex=await dbGetAll('firearms').then(fs=>fs.find(f=>f.name===name));if(!ex){await dbPut('firearms',{name:String(name),make_model:String(r['Make/Model']||''),chamber:String(r['Chamber']||''),caliber:String(r['Caliber']||''),barrel_length:parseFloat(r['Barrel Length (in)'])||null,notes:String(r['Notes']||'')});n++;}}log.push(`<div class="ok">// FIREARMS: ${n}</div>`);}
    const invSheet=wb.Sheets['Inventory'];
    if (invSheet){const rows=XLSX.utils.sheet_to_json(invSheet,{defval:null});let n=0;const tm={'Bullets':'bullet','Powders':'powder','Primers':'primer','Cases':'case'};for (const r of rows){for (const [col,type] of Object.entries(tm)){const name=r[col];if(!name)continue;const ex=await dbGetAll('components').then(cs=>cs.find(c=>c.type===type&&c.name===String(name)));if(!ex){await dbPut('components',{type,name:String(name),quantity:0,fire_count:0,notes:''});n++;}}}log.push(`<div class="ok">// COMPONENTS: ${n}</div>`);}
    const batchSheet=wb.Sheets['Batch Data'];
    if (batchSheet){const rows=XLSX.utils.sheet_to_json(batchSheet,{defval:null});let n=0,s=0;for (const r of rows){const id=r['Batch ID'];if(!id)continue;const ex=await dbGet('batches',String(id));if(ex){s++;continue;}const shots=[];for(let i=1;i<=50;i++){const v=parseFloat(r[`Shot VELO ${i}`]);if(!isNaN(v)&&v>0)shots.push({velocity:v});}await dbPut('batches',{id:String(id),firearm_id:String(r['Firearm ID']||''),bullet:String(r['Bullet']||''),powder:String(r['Powder']||''),primer:String(r['Primer']||''),case_brand:String(r['Case']||''),load_dev_type:String(r['Load Dev Type']||'Validation Batch'),group_mode:'none',cartridge_count:parseInt(r['Cartridge Count'])||10,charge_fixed:parseFloat(r['Charge Fixed'])||null,charge_min:parseFloat(r['Charge Weight Min'])||null,charge_max:parseFloat(r['Charge Weight Max'])||null,coal:parseFloat(r['RDS COAL'])||null,jump:parseFloat(r['Jump Fixed'])||null,rds_source:String(r['Reloading Data Source (RDS)']||''),rds_barrel_length:parseFloat(r['RDS Barrel Length (in)'])||null,rds_velo_min:parseFloat(r['RDS Velo Min'])||null,rds_velo_max:parseFloat(r['RDS Velo Max'])||null,loaded_date:r['Loaded Date']?new Date(r['Loaded Date']).toISOString().slice(0,10):null,range_date:r['Range Date']&&r['Range Date']!=='NaT'?new Date(r['Range Date']).toISOString().slice(0,10):null,shots,bc_g1:null,bullet_weight_gr:null,notes:'',created_at:new Date().toISOString()});n++;}log.push(`<div class="ok">// BATCHES: ${n} IMPORTED, ${s} SKIPPED</div>`);}
    log.push(`<div class="ok">// IMPORT COMPLETE</div>`);
    result.innerHTML=`<div class="import-log">${log.join('')}</div><div style="margin-top:12px">${mkBtn('GO TO DASHBOARD','btn-primary',"navigate('dashboard')")}</div>`;
    toast('IMPORT COMPLETE','success');
  } catch(err){result.innerHTML=`<div class="import-log"><div class="err">// ERROR: ${err.message}</div></div>`;}
}

    </div>

    <!-- Image upload -->
    ${!_tgt.imageData ? `
    <div class="drop-zone" id="tgt-drop" onclick="document.getElementById('tgt-file').click()" style="margin-bottom:12px">
      <div style="color:var(--accent)">${ICONS.upload}</div>

    </div>
    <input type="file" id="tgt-file" accept="image/*" style="display:none" onchange="loadTargetImage(event)">
    ` : ''}

    <!-- Canvas area -->
    ${_tgt.imageData ? `
    <!-- Toolbar -->
    <div class="target-toolbar">
      <button class="target-tool-btn ${_tgt.mode==='scale1'||_tgt.mode==='scale2'?'active':''}" onclick="setTgtMode('scale1')" id="tool-scale">
        SCALE

      <button class="target-tool-btn ${_tgt.mode==='poa'?'active':''}" onclick="setTgtMode('poa')" id="tool-poa">

        EDIT

      <button class="target-tool-btn" onclick="undoLastImpact()" style="color:var(--danger);border-color:rgba(178,76,61,.3)">
        UNDO
      </button>
      <button class="target-tool-btn" onclick="clearTargetSession()" style="color:var(--danger);border-color:rgba(178,76,61,.3)">
        CLEAR
      </button>
    </div>

    <!-- Marker size picker -->
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:10px">
      <span style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-family:'Lora',serif;flex-shrink:0;padding-right:2px">MARKER</span>
      <button class="target-tool-btn${_tgt.impactSize==='sm'?' active':''}" id="tgt-sz-sm" onclick="setImpactSize('sm')" style="flex:0 0 52px;padding:8px 6px;font-size:11px">SM</button>
      <button class="target-tool-btn${_tgt.impactSize==='md'?' active':''}" id="tgt-sz-md" onclick="setImpactSize('md')" style="flex:0 0 52px;padding:8px 6px;font-size:11px">MD</button>
      <button class="target-tool-btn${_tgt.impactSize==='lg'?' active':''}" id="tgt-sz-lg" onclick="setImpactSize('lg')" style="flex:0 0 52px;padding:8px 6px;font-size:11px">LG</button>
    </div>

    <!-- Mode hint -->
    <div class="tgt-mode-hint" id="tgt-hint"></div>

    <!-- Scale input (shown during scale mode) -->
    <div id="tgt-scale-wrap" style="display:none;margin-bottom:10px">
      <div class="form-row">
        <div class="form-group" style="margin-bottom:0">
          <label>Known Distance</label>
          <input class="form-control" id="tgt-scale-dist" type="number" inputmode="decimal" step="0.01" value="1.0" placeholder="e.g. 1.0">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>Unit</label>

    </div>

    <!-- Delete selected impact -->
    <div id="tgt-delete-wrap" style="display:none;margin-bottom:10px">
      ${mkBtnSm('DELETE SELECTED','btn-danger','deleteSelectedImpact()','trash')}
    </div>

    <!-- Canvas -->
    <div id="target-canvas-wrap">
      <canvas id="target-canvas"></canvas>
    </div>

    ` : ''}

  if (_tgt.imageData) {
    initTargetCanvas();
    updateTgtHint();
  }

  // Drag/drop on upload zone
  const dz = document.getElementById('tgt-drop');
  if (dz) {
    dz.addEventListener('dragover', e=>{e.preventDefault();dz.classList.add('over');});
    dz.addEventListener('dragleave', ()=>dz.classList.remove('over'));
    dz.addEventListener('drop', e=>{e.preventDefault();dz.classList.remove('over');if(e.dataTransfer.files[0])loadTargetImageFile(e.dataTransfer.files[0]);});
