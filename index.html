<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Adjustment</title>
    <style>
        /* Add styles for the grid overlay */
        #gridOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 25px
            ),
            repeating-linear-gradient(
                90deg,
                rgba(0, 0, 0, 0.1) 0,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 25px
            );
        }
    </style>
</head>
<body>
    <div id="canvasContainer" style="position: relative;">
        <canvas id="targetCanvas"></canvas>
        <div id="gridOverlay"></div>
    </div>
    <div>
        <label for="scaleSlider">Scale:</label>
        <input type="range" id="scaleSlider" min="1" max="100" value="50">
        <label for="rotationSlider">Rotation:</label>
        <input type="range" id="rotationSlider" min="0" max="360" value="0">
    </div>
    <script>
        // Add JS for handling the canvas adjustments
        const targetCanvas = document.getElementById('targetCanvas');
        const scaleSlider = document.getElementById('scaleSlider');
        const rotationSlider = document.getElementById('rotationSlider');

        scaleSlider.addEventListener('input', function() {
            targetCanvas.style.transform = `scale(${this.value / 50})`;
        });

        rotationSlider.addEventListener('input', function() {
            targetCanvas.style.transform = `rotate(${this.value}deg)`;
        });
    </script>
</body>
</html>
